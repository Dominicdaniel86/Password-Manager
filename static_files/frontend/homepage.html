<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Manager</title>
  <link rel="stylesheet" href="homepage-style.css" />
  <script src="homepage-code.js" defer></script>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div>
        <p class="greeting">Good morning</p>
        <h1 class="title">My vault</h1>
      </div>
      <div class="avatar">JD</div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="number" id="stat-total">—</div>
        <div class="label">Passwords</div>
      </div>
      <div class="stat-card">
        <div class="number warn">—</div>
        <div class="label">Weak</div>
      </div>
      <div class="stat-card">
        <div class="number success">—</div>
        <div class="label">Strong</div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" placeholder="Search passwords..." />
    </div>

    <!-- Passwords -->
    <p class="section-label">Your Passwords</p>

    <div class="entry-list" id="entry-list">
      <p style="text-align:center; color: #888; padding: 1rem;">Loading...</p>
    </div>

    <button class="add-btn" onclick="openModal()">+ Add new password</button>

    <!-- Add Panel (hidden by default, appears below button) -->
    <div id="add-panel" style="display:none;">
      <div class="panel-inner">
        <h2 class="modal-title">New Entry</h2>
        <label class="modal-label">Title *</label>
        <input class="modal-input" id="input-title" type="text" placeholder="e.g. Gmail" />
        <label class="modal-label">Username / Email *</label>
        <input class="modal-input" id="input-username" type="text" placeholder="you@example.com" />
        <label class="modal-label">Password *</label>
        <input class="modal-input" id="input-password" type="password" placeholder="••••••••" />
        <label class="modal-label">URL</label>
        <input class="modal-input" id="input-url" type="text" placeholder="https://example.com" />
        <label class="modal-label">Notes</label>
        <textarea class="modal-input" id="input-notes" rows="2" placeholder="Optional notes..."></textarea>
        <p id="modal-error" style="color:#dc2626; font-size:12px; margin-bottom:0.5rem; display:none;">Please fill in all required fields.</p>
        <div class="modal-actions">
          <button class="modal-cancel" onclick="closeModal()">Cancel</button>
          <button class="modal-save" onclick="handleSave()">Save</button>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
