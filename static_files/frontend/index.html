<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vaultify — Welcome</title>
  <link rel="stylesheet" href="index-style.css" />
  <script src="index-code.js"></script>
</head>
<body>

  <div class="card">

    <div class="logo-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="4" y="11" width="16" height="12" rx="2.5" fill="white"/>
        <path d="M8 11V8a4 4 0 018 0v3" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
        <circle cx="12" cy="17" r="1.5" fill="#1d4ed8"/>
      </svg>
    </div>

    <h1 class="app-name">Vaultify</h1>
    <p class="tagline">Your passwords, safe and always within reach.</p>

    <hr class="divider" />

    <button onclick="login()" class="login-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M10 17l5-5-5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M15 12H3" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      Continue with your account
    </button>

    <p class="terms">
      By continuing you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </p>

  </div>

</body>
</html>
